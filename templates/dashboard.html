<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- For loading chat.js-->

    <title>Progress Tracker</title>
</head>

<body>
  <div class="app-wrapper">

    <!-- Header -->
    <header class="app-header">
      <span class="label">NEET Prep</span>
      <h1>Progress <span>Tracker</span></h1>
    </header>

    <!-- Stats cards -->
    <div class="stats-grid">
      <div class="stat-card card-rank">
        <span class="stat-label">Latest Rank</span>
        <span class="stat-value" id="stat-rank">—</span>
        <span class="stat-sub" id="stat-rank-sub">Best: —</span>
      </div>
      <div class="stat-card card-score">
        <span class="stat-label">Latest Score</span>
        <span class="stat-value" id="stat-score">—</span>
        <span class="stat-sub" id="stat-score-sub">— %</span>
      </div>
      <div class="stat-card card-avg">
        <span class="stat-label">Avg %</span>
        <span class="stat-value" id="stat-avg">—</span>
        <span class="stat-sub" id="stat-avg-sub">—</span>
      </div>
    </div>

    <!-- Chart -->
    <div class="chart-section">
      <div class="chart-header">
        <div>
          <div class="chart-title">Score Trend</div>
          <div class="chart-subtitle" id="chart-subtitle">Max 720 marks</div>
        </div>
      </div>

      <!-- Filter pills -->
      <div class="filter-pills">
        <button class="filter-btn" data-subject="total"><span class="dot"></span>Total</button>
        <button class="filter-btn" data-subject="physics"><span class="dot"></span>Physics</button>
        <button class="filter-btn" data-subject="chemistry"><span class="dot"></span>Chemistry</button>
        <button class="filter-btn" data-subject="botany"><span class="dot"></span>Botany</button>
        <button class="filter-btn" data-subject="zoology"><span class="dot"></span>Zoology</button>
        <button class="filter-btn" data-subject="rank"><span class="dot"></span>Rank</button>
      </div>

      <p class="filter-hint" id="filter-hint">Tap multiple subjects to compare</p>

      <canvas id="myChart"></canvas>
    </div>

    <!-- Insight -->
    <div class="insight-card" id="insight-card"></div>

  </div>

  <!-- FAB -->
  <div class="fab-wrap">
    <span class="fab-label">Add test</span>
    <a href="/add" class="fab" aria-label="Add new test">＋</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>

  <script>
    const rawData = {{ data | tojson }};

    // Update hint text whenever filter changes
    const _origHandleFilter = handleFilter;
    // (handled inside script.js — just init)
    initDashboard(rawData);

    // Override to also update hint
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
        const hint = document.getElementById('filter-hint');
        if (!hint) return;
        if (activeSubjects.length > 1) {
            hint.textContent = `Comparing ${activeSubjects.length} subjects — tap to deselect`;
        } else {
            hint.textContent = 'Tap multiple subjects to compare';
        }
        });
    });
    </script>


</body>


</html>
