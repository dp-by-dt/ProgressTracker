<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- For loading chat.js-->

    <title>Progress Tracker</title>
</head>
<body>
    <button onclick="showTotal()">Total</button>
    <button onclick="showPhysics()">Physics</button>
    <button onclick="showChemistry()">Chemistry</button>
    <button onclick="showBotany()">Botany</button>
    <button onclick="showZoology()">Zoology</button>


    <canvas id="myChart"></canvas>

    <a href="/add">
        <button>Add New Test</button>
    </a>

    <script>
        const rawData = {{ data | tojson }};

        const labels = rawData.map(item => item.testName);
        const totals = rawData.map(item => item.total);
        const physics = rawData.map(item => item.physics);
        const chemistry = rawData.map(item => item.chemistry);
        const botany = rawData.map(item => item.botany);
        const zoology = rawData.map(item => item.zoology);

        const ctx = document.getElementById('myChart');


        let myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Marks',
                    data: totals,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true
                    }
                }
            }
        });

        
        function updateChart(label, newData) {
            myChart.data.datasets[0].label = label;
            myChart.data.datasets[0].data = newData;
            myChart.update();
        }

        function showTotal() {
            updateChart('Total Marks', totals);
        }

        function showPhysics() {
            updateChart('Physics', physics);
        }

        function showChemistry() {
            updateChart('Chemistry', chemistry);
        }

        function showBotany() {
            updateChart('Botany', botany);
        }

        function showZoology() {
            updateChart('Zoology', zoology);
        }
    </script>
</body>
</html>
