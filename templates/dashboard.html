<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='script.js') }}"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> <!-- For loading chat.js-->

    <title>Progress Tracker</title>
</head>
<body>
    <button class="filter-btn" onclick="showTotal(); setActive(this)">Total</button>

    <button class="filter-btn" onclick="showPhysics(); setActive(this)">Physics</button>
    <button class="filter-btn" onclick="showChemistry(); setActive(this)">Chemistry</button>
    <button class="filter-btn" onclick="showBotany(); setActive(this)">Botany</button>
    <button class="filter-btn" onclick="showZoology(); setActive(this)">Zoology</button>

    <button class="filter-btn" onclick="showRank(); setActive(this)">Rank</button>


    <canvas id="myChart"></canvas>

    <h3 id="insight"></h3>

    <a href="/add">
        <button>Add New Test</button>
    </a>

    <script>

        
        const rawData = {{ data | tojson }};
        
        document.getElementById("insight").innerText = generateInsight(rawData);

        const labels = rawData.map(item => item.testName);
        const totals = rawData.map(item => item.total);

        const physics = rawData.map(item => item.physics);
        const chemistry = rawData.map(item => item.chemistry);
        const botany = rawData.map(item => item.botany);
        const zoology = rawData.map(item => item.zoology);

        const ranks = rawData.map(item => item.rank);


        const ctx = document.getElementById('myChart');
        let myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Total Marks',
                    data: totals,
                    borderWidth: 2,
                    tension: 0.3,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: true
                    }
                },
                scales: {
                    y: {
                        // beginAtZero: false
                        reverse: false
                    }
                }
            }
        });


        window.onload = () => {
            showTotal();
        };

        
        function updateChart(label, newData, axis_inv=false) {
            myChart.data.datasets[0].label = label;
            myChart.data.datasets[0].data = newData;
            myChart.options.scales.y.reverse = axis_inv;
            myChart.update();
        }

        function showTotal() {
            updateChart('Total Marks', totals);
        }

        function showPhysics() {
            updateChart('Physics', physics);
        }

        function showChemistry() {
            updateChart('Chemistry', chemistry);
        }

        function showBotany() {
            updateChart('Botany', botany);
        }

        function showZoology() {
            updateChart('Zoology', zoology);
        }

        function showRank() {
            updateChart('Rank', ranks, axis_inv=true);
        }

    </script>
</body>
</html>
