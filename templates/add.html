<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Data</title>
</head>
<body>

    <h2>Add New Test</h2>

    <form method="POST" action="/add">
        <input type="text" name="testName" placeholder="Test Name" required><br>

        <input type="date" name="testDate" placeholder="Date"><br>

        <input type="number" name="physics" placeholder="Physics"><br>
        <input type="number" name="chemistry" placeholder="Chemistry"><br>
        <input type="number" name="botany" placeholder="Botany"><br>
        <input type="number" name="zoology" placeholder="Zoology"><br>

        <input type="number" name="rank" placeholder="Rank"><br>

        <button type="submit">Save</button>
    </form>


</body>
</html>
