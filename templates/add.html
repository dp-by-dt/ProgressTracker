<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Test</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-page">

  <div class="form-header">
    <a href="/" class="back-btn" aria-label="Back">←</a>
    <div class="form-header-text">
      <h2>New Test</h2>
      <p>Enter your scores below</p>
    </div>
  </div>

  <div class="form-body">
    <form method="POST" action="/add">

      <p class="form-section-title">Test Info</p>
      <div class="form-group" style="margin-top:8px">
        <label for="testName">Test Name</label>
        <input type="text" id="testName" name="testName" placeholder="e.g. Mock Test 4" required>
      </div>
      <div class="form-group" style="margin-top:12px">
        <label for="testDate">Date</label>
        <input type="date" id="testDate" name="testDate" required>
      </div>

      <p class="form-section-title" style="margin-top:20px">Subject Scores</p>
      <div class="scores-grid" style="margin-top:8px">
        <div class="form-group physics">
          <label><span class="subject-dot" style="background:#6ba3be"></span>Physics</label>
          <input type="number" name="physics" placeholder="0–180" min="-45" max="180" step="any" required>
        </div>
        <div class="form-group chemistry">
          <label><span class="subject-dot" style="background:#7dab8a"></span>Chemistry</label>
          <input type="number" name="chemistry" placeholder="0–180" min="-45" max="180" step="any" required>
        </div>
        <div class="form-group botany">
          <label><span class="subject-dot" style="background:#c4956a"></span>Botany</label>
          <input type="number" name="botany" placeholder="0–180" min="-45" max="180" step="any" required>
        </div>
        <div class="form-group zoology">
          <label><span class="subject-dot" style="background:#b07db8"></span>Zoology</label>
          <input type="number" name="zoology" placeholder="0–180" min="-45" max="180" step="any" required>
        </div>
      </div>

      <!-- Live preview -->
      <div class="score-preview" style="margin-top:4px">
        <span>Total / %</span>
        <span><strong id="preview-total">0</strong> &nbsp;·&nbsp; <span id="preview-pct">0.0%</span></span>
      </div>

      <p class="form-section-title" style="margin-top:20px">Rank</p>
      <div class="form-group" style="margin-top:8px">
        <label for="rank">Your Rank</label>
        <input type="number" id="rank" name="rank" placeholder="e.g. 42" min="1" required>
      </div>

      <button type="submit" class="submit-btn" style="margin-top:28px">Save Test</button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
  <script>initFormPage();</script>
</body>
</html>
